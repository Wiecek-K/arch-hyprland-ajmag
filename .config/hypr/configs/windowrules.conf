# --- APPLICATIONS BLUR & OPACITY (WindowRule V2) ---
windowrule {
  name = steam-tiling
  tile = on
  match:initial_class = ^(steam)$
}

windowrule {
  name = windowrule-1
  no_blur = on
  opacity = 1.0 override 1.0 override
  float = on
  size = 900 506
  match:tag = multimedia_video*
}

windowrule {
  name = windowrule-2
  opacity = 0.8 override 0.8 override
  float = on
  match:tag = settings*
}

windowrule {
  name = windowrule-3
  opacity = 0.8 override 0.8 override
  match:class = ^(org.gnome.Nautilus)$
}

windowrule {
  name = windowrule-4
  opacity = 0.9 override 0.9 override
  match:class = ^(org.gnome.TextEditor|mousepad)$
}

windowrule {
  name = windowrule-5
  opacity = 0.9 override 0.9 override
  float = on
  size = (monitor_w*0.5) (monitor_h*0.6)
  match:class = ^(org.pulseaudio.pavucontrol)$
}

windowrule {
  name = satty-float
  match:class = .*satty.*
  float = on
}


# Specific rule for Kitty (Terminal)
# Active: 0.85 | Inactive: 0.7 | Fullscreen: 1.0
windowrule {
  name = windowrule-6
  opacity = 0.85 override 0.7 override 1.0 override
  match:class = ^(kitty)$
}


# Spotify specific rule
# Active: 0.85 | Inactive: 0.6 | Fullscreen: 1.0
windowrule {
  name = windowrule-7
  opacity = 0.91 override 0.8 override 1.0 override
  match:class = ^(spotify)$
}


# --- HIGH VISIBILITY RULES ---

# 1. Browsers (Firefox, Chrome, Brave, Zen)
# Active: 1.0 | Inactive: 0.95 | Fullscreen: 1.0
windowrule {
  name = windowrule-8
  opacity = 1.0 override 0.95 override 1.0 override
  match:class = ^(firefox|org.mozilla.firefox|[Cc]hromium|[Gg]oogle-chrome|brave-browser|zen)$
}


# 2. Code Editors (VS Code, Sublime, Gedit, Alacritty)
# Full opacity for all states
windowrule {
  name = windowrule-9
  opacity = 1.0 override 1.0 override 1.0 override
  match:class = ^(code-oss|vscode|code|jetbrains-.*|Alacritty|gedit)$
}


# 3. Messengers (Vesktop, Discord, Telegram, Slack)
# Active: 1.0 | Inactive: 0.95 | Fullscreen: 1.0
windowrule {
  name = windowrule-10
  opacity = 1.0 override 0.95 override 1.0 override
  match:class = ^(vesktop|discord|org.telegram.desktop|Slack)$
}


# 4. Documentation / Notes (Obsidian, Logseq)
# Active: 1.0 | Inactive: 0.95 | Fullscreen: 1.0
windowrule {
  name = windowrule-11
  opacity = 0.98 override 0.94 override 1.0 override
  match:class = ^(obsidian|Logseq)$
}


# --- LAYER RULES ---
layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0.5
  match:namespace = waybar
}


layerrule {
  name = layerrule-2
  blur = on
  ignore_alpha = 0.5
  xray = 0
  animation = none
  match:namespace = swaync-control-center
}


layerrule {
  name = layerrule-3
  blur = on
  ignore_alpha = 0.5
  xray = 0
  match:namespace = swaync-notification-window
}


layerrule {
  name = layerrule-4
  blur = on
  ignore_alpha = 0
  match:namespace = wlogout
}


layerrule {
  name = layerrule-5
  blur = on
  ignore_alpha = 0
  match:namespace = flameshot
}


# --- FLOATING & SIZES ---
windowrule {
  name = windowrule-12
  float = on
  match:tag = viewer*
}



# Ignore maximize requests from apps
windowrule {
  name = windowrule-13
  suppress_event = maximize
  match:class = negative:^(steam_app_|steam|WaylandToX11).*$
}


# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-14
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}


# POP UPS AND DIALOGUES
windowrule {
  name = windowrule-15
  float = on
  size = (monitor_w*0.5) (monitor_h*0.6)
  center = on
  match:title = ^(Save As|Save a File|Pick Files)$
}


windowrule {
  name = windowrule-16
  float = on
  size = (monitor_w*0.7) (monitor_h*0.6)
  match:initial_title = ^(Open Files)$
}


# --- Flameshot Workarounds ---
windowrule {
  name = windowrule-17
  float = on
  pin = on
  move = (0) (0)
  match:class = ^(flameshot)$
}


# --- Show Me The Key ---
windowrule {
  name = windowrule-18
  float = on
  pin = on
  border_size = 0
  no_shadow = on
  opacity = 0.6 override 0.6 override 0.6 override
  no_blur = on
  no_anim = on
  match:class = ^(showmethekey-gtk)$
}
