###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, RETURN, exec, [float; size 800 550] $terminal 
bind = $mainMod, Q, killactive,
bind = CTRL ALT, Delete, exec, hyprctl dispatch exit 0 # exit Hyprland
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Space, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, O, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, R, exec, ~/.config/hypr/scripts/wbrestart.sh
bind = $mainMod, B, exec, xdg-open "https://"  # default browser
bind = $mainMod, L, exec, ~/.config/hypr/scripts/Wlogout.sh
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wppicker.sh
bind = $mainMod SHIFT, Q, exec, ~/.config/hypr/scripts/KillActiveProcess.sh # Kill active process
bind = $mainMod, C, exec, hyprpicker -a
bind = $mainMod CTRL, B, exec, ~/.config/hypr/scripts/WaybarStyles.sh # Waybar Styles Menu
bind = $mainMod ALT, B, exec, ~/.config/hypr/scripts/WaybarLayout.sh # Waybar Layout Menu
bind = $mainMod, H, exec, pkill -SIGUSR1 waybar # Hide Waybar
bind = $mainMod SHIFT, E, exec, kitty yazi # Yazi File Manager
bind = $mainMod, P, exec, ~/.config/hypr/scripts/monitor_switch.sh
bind = $mainMod, Z, exec, pypr-client zoom               
  

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move  Windows
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

# Resize windows
binde = $mainMod SHIFT, left, resizeactive,-50 0
binde = $mainMod SHIFT, right, resizeactive,50 0
binde = $mainMod SHIFT, up, resizeactive,0 -50
binde = $mainMod SHIFT, down, resizeactive,0 50

# Switch workspaces with mainMod 
bind = $mainMod LSHIFT, 1, workspace, 1
bind = $mainMod LSHIFT, 2, workspace, 2
bind = $mainMod, bracketleft, workspace, 3
bind = $mainMod LSHIFT, 9, workspace, 4  
bind = $mainMod LSHIFT, 7, workspace, 6
bind = $mainMod LSHIFT, backslash, workspace, 5
bind = $mainMod LSHIFT, 0, workspace, 7
bind = $mainMod, bracketright, workspace, 8
bind = $mainMod, minus, workspace, 10
bind = $mainMod, equal, workspace, 9

# bind = $mainMod, 1, workspace, 1
# bind = $mainMod, 2, workspace, 2
# bind = $mainMod, 3, workspace, 3
# bind = $mainMod, 4, workspace, 4  
# bind = $mainMod, 5, workspace, 5
# bind = $mainMod, 6, workspace, 6
# bind = $mainMod, 7, workspace, 7
# bind = $mainMod, 8, workspace, 8
# bind = $mainMod, 9, workspace, 9
# bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + CTRL
bind = $mainMod CTRL LSHIFT, 1, movetoworkspace, 1
bind = $mainMod CTRL LSHIFT, 2, movetoworkspace, 2
bind = $mainMod CTRL, bracketleft, movetoworkspace, 3
bind = $mainMod CTRL LSHIFT, 9, movetoworkspace, 4
bind = $mainMod CTRL LSHIFT, 7, movetoworkspace, 6
bind = $mainMod CTRL LSHIFT, backslash, movetoworkspace, 5
bind = $mainMod CTRL LSHIFT, 0, movetoworkspace, 7
bind = $mainMod CTRL, bracketright, movetoworkspace, 8
bind = $mainMod CTRL, minus, movetoworkspace, 10
bind = $mainMod CTRL, equal, movetoworkspace, 9

# bind = $mainMod CTRL, 1, movetoworkspace, 1
# bind = $mainMod CTRL, 2, movetoworkspace, 2
# bind = $mainMod CTRL, 3, movetoworkspace, 3
# bind = $mainMod CTRL, 4, movetoworkspace, 4
# bind = $mainMod CTRL, 5, movetoworkspace, 5
# bind = $mainMod CTRL, 6, movetoworkspace, 6
# bind = $mainMod CTRL, 7, movetoworkspace, 7
# bind = $mainMod CTRL, 8, movetoworkspace, 8
# bind = $mainMod CTRL, 9, movetoworkspace, 9
# bind = $mainMod CTRL, 0, movetoworkspace, 10

# Move current workspace to monitor > direction
bind = $mainMod CTRL SHIFT, left, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL SHIFT, right, movecurrentworkspacetomonitor, r
bind = $mainMod CTRL SHIFT, up, movecurrentworkspacetomonitor, u
bind = $mainMod CTRL SHIFT, down, movecurrentworkspacetomonitor, d

# Example special workspace (scratchpad)
bind = $mainMod, U, togglespecialworkspace, magic
bind = $mainMod CTRL, U, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume.sh --inc
bindel = ,XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume.sh --dec
bindel = ,XF86AudioMute, exec, ~/.config/hypr/scripts/volume.sh --toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh --inc
bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh --dec

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Gamemode (Toggle visual effects for performance)
bind = $mainMod, F1, exec, ~/.config/hypr/scripts/gamemode.sh
