general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # tylko wybudzenie ekranu; lock zrobil juz before_sleep_cmd (NIE zabijac hyprlock!)
}

# === MONITOR DIM ===
listener {
    timeout = 740
    on-timeout = brightnessctl -s set 20         # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r                 # monitor backlight restore.
}

# === LOCKSCREEN ===
listener {
    timeout = 900
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

# === TURN OFF SCREEN ===
# Disabled: DPMS off/on cycle causes panel wedging on NVIDIA (aquamarine #304)
# listener {
#     timeout = 950
#     on-timeout = hyprctl dispatch dpms off
#     on-resume = hyprctl dispatch dpms on && brightnessctl -r
# }

# === SUSPEND ===
listener {
    timeout = 1800                                # 30min
    on-timeout = systemctl suspend                # suspend pc
}
