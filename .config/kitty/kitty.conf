# ==============================================================================
# FONTS
# ==============================================================================
font_family      AtkinsonHyperlegibleMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# ==============================================================================
# CURSOR
# ==============================================================================
# Shape options: block, beam, underline
cursor_shape          beam
cursor_beam_thickness 1.8

# Blink interval in seconds (0 = disabled, -1 = system default)
cursor_blink_interval 0.6

# Stop blinking after x seconds (0 = never)
cursor_stop_blinking_after 15.0

# Cursor shape when window is not focused
cursor_shape_unfocused unchanged

# Animated cursor trail
cursor_trail 1

# ==============================================================================
# TAB BAR
# ==============================================================================
tab_bar_edge      top
tab_bar_style     powerline

# Powerline style options: angled, slanted, round
tab_powerline_style round

tab_title_template " {index}: {title} "

# ==============================================================================
# WINDOW LAYOUT
# ==============================================================================
window_padding_width    4
confirm_os_window_close 0

# ==============================================================================
# SYSTEM & PERFORMANCE
# ==============================================================================
scrollback_lines       2000
wheel_scroll_min_lines 1
enable_audio_bell      no

# Display server: auto, wayland, x11
linux_display_server   auto

# ==============================================================================
# COLORS
# ==============================================================================
include colors.conf
